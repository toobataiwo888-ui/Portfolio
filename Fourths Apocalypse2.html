    img:nth-child(3) { animation-delay: 0.2s; }
    img:nth-child(4) { animation-delay: 0.3s; }

    img:nth-child(7) { animation-delay: 0.6s; }
    img:nth-child(8) { animation-delay: 0.7s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
